---
layout: post
---
{% assign latest_post = site.posts.first %}
{% if latest_post %}
  <!-- Tells Jekyll to render the latest post's content dynamically inside the post template framework -->
  <script>
    // Silently redirect to the actual latest post's compiled URL to preserve the active nav states and links
    window.location.replace("{{ latest_post.url }}");
  </script>
{% else %}
  <div class="text-center p-5">
    <h1>Welcome to the Blog</h1>
    <p class="text-muted-custom">No logs have been written to the <code>_posts</code> directory yet.</p>
  </div>
{% endif %}
