<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "Aaron Prisk" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    
    <style>
        :root {
            --pg-vibrant-green: #37efba;    
            --pg-vibrant-green-hover: #29d8a5; 
            --pg-medium-blue: #3f79f8;      
            --pg-white-text: #ffffff;
            --pg-muted-text: rgba(255, 255, 255, 0.75); 
            --pg-glass-color: rgba(255, 255, 255, 0.05);
            --pg-glass-border: rgba(255, 255, 255, 0.12);
        }

        html, body {
            margin: 0; padding: 0;
            color: var(--pg-white-text);
            background-color: #02040a;
            height: 100vh;
            overflow: hidden;
        }

        #space-canvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
        }

        .gradient-scroll-wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            z-index: 2;
            background: linear-gradient(to bottom, 
                rgba(2, 4, 10, 0.4) 0%, 
                rgba(19, 11, 43, 0.65) 35%, 
                rgba(3, 27, 41, 0.8) 100%
            );
            display: flex;
            flex-direction: column;
        }

        .blog-nav {
            background: rgba(2, 4, 10, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--pg-glass-border);
            padding: 1rem 2rem;
        }
        .nav-logo {
            color: var(--pg-white-text);
            text-decoration: none;
            font-weight: bold;
            font-size: 1.25rem;
            transition: color 0.2s;
        }
        .nav-logo:hover { color: var(--pg-vibrant-green); }

        .glass-pane {
            background-color: var(--pg-glass-color);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--pg-glass-border);
            border-radius: 24px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>

    <canvas id="space-canvas"></canvas>

    <div class="gradient-scroll-wrapper">
        
<!-- Header Ribbon inside default.html -->
        <nav class="blog-nav d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-3">
                <!-- If on a blog post or index show the mobile-friendly menu button -->
                {% if page.layout == "post" or page.url == "/blog.html" %}
                <button class="btn btn-outline-light d-lg-none rounded-pill px-3 py-1 border-0" 
                        type="button" 
                        data-bs-toggle="offcanvas" 
                        data-bs-target="#sidebarMenu" 
                        aria-controls="sidebarMenu" 
                        style="background: rgba(255,255,255,0.05); font-size: 0.85rem;">
                    📖 Menu
                </button>
                {% endif %}
                <a href="/index.html" class="nav-logo">&larr; Aaron Prisk</a>
            </div>
            <span class="text-uppercase small tracking-wider fw-bold d-none d-sm-inline" style="color: var(--pg-vibrant-green);"></span>
        </nav>

        <!-- Dynamic Page Content gets injected here -->
        {{ content }}

    </div>

    <!-- Background Space Canvas Script -->
    <script>
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        const numStars = 150;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < numStars; i++) {
                let factor = Math.random();
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: (factor * 1.3) + 0.2,
                    speed: factor * 0.25 + 0.05,
                    color: factor > 0.85 ? '#a0bcff' : '#ffffff'
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < stars.length; i++) {
                let s = stars[i];
                s.y -= s.speed;
                if (s.y < 0) s.y = canvas.height;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fillStyle = s.color;
                ctx.fill();
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        animate();
    </script>
</body>
</html>
