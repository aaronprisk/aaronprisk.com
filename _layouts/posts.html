---
layout: default
---
<style>
    .workspace-container {
        flex: 1;
        display: flex;
        overflow: hidden;
        padding: 1.5rem;
        gap: 1.5rem;
    }

    .archive-sidebar {
        width: 300px;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
    }
    
    .archive-title {
        font-size: 1.2rem;
        font-weight: bold;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 0.75rem;
        margin-bottom: 1rem;
    }

    .posts-list {
        list-style: none;
        padding: 0;
        margin: 0;
        overflow-y: auto;
        flex: 1;
    }

    .post-link-item {
        display: block;
        padding: 0.75rem 1rem;
        margin-bottom: 0.5rem;
        border-radius: 12px;
        font-size: 0.9rem;
        color: var(--pg-muted-text);
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.04);
        text-decoration: none;
        transition: all 0.2s ease;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .post-link-item:hover, .post-link-item.active {
        color: #02040a !important;
        background-color: var(--pg-vibrant-green);
        border-color: var(--pg-vibrant-green);
        transform: translateX(4px);
    }

    .content-display {
        flex: 1;
        padding: 2rem;
        overflow-y: auto;
    }

    /* Markdown elements styling */
    .post-body {
        line-height: 1.7;
        font-size: 1.05rem;
        color: rgba(255, 255, 255, 0.9);
    }
    .post-body h1 {
        font-weight: 700;
        color: var(--pg-white-text);
        margin-bottom: 1.5rem;
        border-bottom: 2px solid rgba(255,255,255,0.1);
        padding-bottom: 0.5rem;
        font-size: 2rem;
    }
    .post-body h2, .post-body h3 {
        color: var(--pg-white-text);
        margin-top: 2rem;
        margin-bottom: 1rem;
    }
    .post-body code {
        background: rgba(255,255,255,0.1);
        padding: 0.2rem 0.4rem;
        border-radius: 4px;
        font-size: 0.9em;
        color: var(--pg-vibrant-green);
    }
    .post-body pre {
        background: rgba(0,0,0,0.4);
        border: 1px solid var(--pg-glass-border);
        padding: 1.5rem;
        border-radius: 12px;
        overflow-x: auto;
    }
    .post-body pre code {
        color: var(--pg-white-text);
        background: transparent;
        padding: 0;
    }

    /* --- RESPONSIVE OVERRIDES --- */
    @media (max-width: 991.98px) {
        .workspace-container {
            padding: 1rem;
        }
        .content-display {
            padding: 1.5rem;
            border-radius: 16px;
        }
        .archive-sidebar.offcanvas-lg {
            background-color: rgba(10, 12, 22, 0.95) !important;
            border-right: 1px solid var(--pg-glass-border);
            border-radius: 0;
        }
        .post-body h1 {
            font-size: 1.6rem;
        }
    }
</style>

<div class="workspace-container">
    
    <!-- Collapsible Responsive Sidebar -->
    <div class="glass-pane archive-sidebar offcanvas-lg offcanvas-start" 
         tabindex="-1; " 
         id="sidebarMenu" 
         aria-labelledby="sidebarMenuLabel">
        
        <div class="offcanvas-header d-lg-none border-bottom border-secondary mb-3 pb-2">
            <h5 class="offcanvas-title" id="sidebarMenuLabel">📖 Table of Contents</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu" aria-label="Close"></button>
        </div>

        <div class="offcanvas-body d-flex flex-column h-100 p-0">
            <div class="archive-title d-none d-lg-block">📖 Archive Logs</div>
            <ul class="posts-list">
                {% for post in site.posts %}
                    <li>
                        <a href="{{ post.url }}" 
                           class="post-link-item {% if page.url == post.url %}active{% endif %}"
                           data-bs-dismiss="offcanvas"
                           data-bs-target="#sidebarMenu">
                            {{ post.title }}
                        </a>
                    </li>
                {% endfor %}
            </ul>
        </div>
    </div>

    <!-- Main Content Panel -->
    <div class="glass-pane content-display">
        <article class="post-body">
            <h1>{{ page.title }}</h1>
            <p class="text-muted-custom small mb-4">Posted on {{ page.date | date: "%B %d, %Y" }}</p>
            
            {{ content }} <!-- Compiled Markdown content injected here! -->
        </article>
    </div>

</div>
